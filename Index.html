        /* --- ROOT & THEME VARIABLES --- */
        :root {
            --primary: #16A34A;

            --gold: #FBBF24;

        /* --- BASE RESET --- */
        * {

            padding: 0;

            font-family: 'Poppins', sans-serif;

        .spinner {

        @keyframes spin {
